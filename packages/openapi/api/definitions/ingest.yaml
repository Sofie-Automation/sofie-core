title: ingest
description: Ingest methods
resources:
  playlists:
    get:
      operationId: getPlaylists
      summary: Gets all Playlists.
      tags:
        - ingest
      responses:
        200:
          description: Command successfully handled - returns an array of Playlists.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/playlistResponse'
    delete:
      operationId: deletePlaylists
      tags:
        - ingest
      summary: Delete multiple playlists. Resources under the Playlist (e.g. Rundowns) will also be removed.
      responses:
        202:
          description: Request for deleting accepted.
  playlist:
    get:
      operationId: getPlaylist
      summary: Gets a specific Playlist.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Requested Playlist.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Playlist is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/playlistResponse'
        404:
          description: Invalid playlistId
          $ref: '#/components/responses/playlistNotFound'
    delete:
      operationId: deletePlaylist
      summary: Deletes a specified Playlist. Resources under the Playlist (e.g. Rundowns) will also be removed.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist to delete.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request for deleting accepted.
        404:
          $ref: '#/components/responses/playlistNotFound'
  rundowns:
    get:
      operationId: getRundowns
      summary: Gets all Rundowns belonging to a Playlist.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist to get all Rundowns for.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Command successfully handled - returns an array of Rundowns.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/rundownResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    post:
      operationId: postRundown
      summary: Creates the Rundowns in a Playlist.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist to create Rundowns for.
          required: true
          schema:
            type: string
      requestBody:
        description: Rundown data to ingest.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rundown'
      responses:
        202:
          description: Request has been accepted.
        400:
          description: Bad request.
    put:
      operationId: putRundowns
      summary: Updates the Rundowns in a Playlist. Any existing Rundowns in the Playlist that are not included in this list will be deleted (including their Segments and Parts). Rundowns will be placed in the Playlist in the order specified by their individual ranks. If the creation/deletion/updating of any Rundown fails all changes will be discarded.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist to create/update all Rundowns for.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Rundown data.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/rundown'
      responses:
        202:
          description: Request has been accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
    delete:
      operationId: deleteRundowns
      tags:
        - ingest
      summary: Delete multiple rundowns. Resources under the Rundown (e.g. Segments) will also be removed.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the ingest Part belongs to.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Rundown removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    const: 200
                    example: 200
                required:
                  - status
                additionalProperties: false
        404:
          $ref: '#/components/responses/idNotFound'
  rundown:
    get:
      operationId: getRundown
      summary: Gets ingest data for a specific Rundown.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Rundown belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to return.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Rundown is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rundownResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    put:
      operationId: putRundown
      summary: Updates an existing Rundown.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist to ingest Rundown into.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to create/update.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Rundown data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rundown'
      responses:
        202:
          description: Request has been accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    delete:
      operationId: deleteRundown
      summary: Deletes a specified ingest Rundown. Resources under the Rundown (e.g. Segments) will also be removed.
      tags:
        - ingest
      parameters:
        - name: playlistId
          in: path
          description: Playlist the ingest Rundown belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to delete.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request for deleting accepted.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
  segments:
    get:
      operationId: getSegments
      tags:
        - ingest
      summary: Gets all Segments belonging to a Rundown.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Rundown belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to get Segments for.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Command successfully handled - returns an array of Segments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/segmentResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    post:
      operationId: postSegment
      tags:
        - ingest
      summary: Creates a Segment in a Rundown.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Segment belongs to.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Segment data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/segment'
      responses:
        202:
          description: Request accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    put:
      operationId: putSegments
      tags:
        - ingest
      summary: Updates the Segments in a Rundown. Any existing Segments in the Rundown that are not included in this list will be deleted (including their Parts). Segments will be placed in the Rundown in the order specified by their individual ranks. If the creation/deletion/updating of any Segment fails all changes will be discarded.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Rundown belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to create/update all Segments for.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Segment data.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/segment'
      responses:
        202:
          description: Request accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    delete:
      operationId: deleteSegments
      tags:
        - ingest
      summary: Delete segment.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the ingest Part belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the ingest Part belongs to.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request accepted.
        404:
          $ref: '#/components/responses/idNotFound'
  segment:
    get:
      operationId: getSegment
      tags:
        - ingest
      summary: Gets specific Segment.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Segment belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to create/update.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Segment is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/segmentResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/segmentNotFound'
    put:
      operationId: putSegment
      tags:
        - ingest
      summary: Updates an existing Segment.
      parameters:
        - name: playlistId
          in: path
          description: Playlist to ingest Segment into.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to ingest Segment into.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to create/update.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Segment data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/segment'
      responses:
        202:
          description: Request accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
    delete:
      operationId: deleteSegment
      tags:
        - ingest
      summary: Deletes a specified ingest Segment. Resources under the Segment (e.g. Parts) will also be removed.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the ingest Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the ingest Segment belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to delete.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request accepted.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
  parts:
    get:
      operationId: getParts
      tags:
        - ingest
      summary: Gets the data for all Parts belonging to a Segment.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Segment belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to get Parts for.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Command successfully handled - returns an array of Parts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/partResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/segmentNotFound'
    post:
      operationId: postPart
      tags:
        - ingest
      summary: Creates Part in a Segment.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Segment belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment the Part belongs to.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Parts data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/part'
      responses:
        202:
          description: Request accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/partNotFound'
    put:
      operationId: putParts
      tags:
        - ingest
      summary: Updates the Parts in a Segment. Any existing Parts in the Segment that are not included in this list will be deleted. Parts will be placed in the Segment in the order specified by their individual ranks. If the creation/deletion/updating of any Parts fails all changes will be discarded.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Segment belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Segment belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to create/update all Parts for.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the Parts data.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/part'
      responses:
        202:
          description: Request accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/partNotFound'
    delete:
      operationId: deleteParts
      tags:
        - ingest
      summary: Delete multiple Parts.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Part belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Part belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment the Part belongs to.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request for deleting accepted.
        404:
          $ref: '#/components/responses/idNotFound'
  part:
    get:
      operationId: getPart
      tags:
        - ingest
      summary: Gets data for a specific Part.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Part belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Part belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment the Part belongs to.
          required: true
          schema:
            type: string
        - name: partId
          in: path
          description: Part to create/update.
          required: true
          schema:
            type: string
      responses:
        200:
          description: Part is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/partResponse'
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/segmentNotFound'
          #   - $ref: '#/components/responses/partNotFound'
    put:
      operationId: putPart
      tags:
        - ingest
      summary: Updates an existing Part.
      parameters:
        - name: playlistId
          in: path
          description: Playlist to ingest Part into.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown to ingest Part into.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment to ingest Part into.
          schema:
            type: string
        - name: partId
          in: path
          description: Part to update/create.
          schema:
            type: string
      requestBody:
        description: Contains the Rundown data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/part'
      responses:
        202:
          description: Request has been accepted.
        400:
          description: Bad request.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/segmentNotFound'
    delete:
      operationId: deletePart
      tags:
        - ingest
      summary: Deletes a specified Part.
      parameters:
        - name: playlistId
          in: path
          description: Playlist the Part belongs to.
          required: true
          schema:
            type: string
        - name: rundownId
          in: path
          description: Rundown the Part belongs to.
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          description: Segment the Part belongs to.
          required: true
          schema:
            type: string
        - name: partId
          in: path
          description: Part to delete.
          required: true
          schema:
            type: string
      responses:
        202:
          description: Request has been accepted.
        404:
          $ref: '#/components/responses/idNotFound'
          # oneOf:
          #   - $ref: '#/components/responses/playlistNotFound'
          #   - $ref: '#/components/responses/rundownNotFound'
          #   - $ref: '#/components/responses/segmentNotFound'

components:
  responses:
    idNotFound:
      # oneOf responses don't render correctly with current tools. Use this response as a replacement.
      description: The specified resource does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: number
                const: 404
                example: 404
              message:
                type: string
                example: The specified resource was not found.
            required:
              - status
              - message
            additionalProperties: false
    playlistNotFound:
      description: The specified Playlist does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: number
                const: 404
                example: 404
              notFound:
                type: string
                const: playlist
                example: playlist
              message:
                type: string
                example: The specified Playlist was not found.
            required:
              - status
              - notFound
              - message
            additionalProperties: false
    rundownNotFound:
      description: The specified Rundown does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: number
                const: 404
                example: 404
              message:
                type: string
                example: The specified Rundown was not found.
            required:
              - status
              - notFound
              - message
            additionalProperties: false
    segmentNotFound:
      description: The specified Segment does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: number
                const: 404
                example: 404
              message:
                type: string
                example: The specified Segment was not found.
            required:
              - status
              - notFound
              - message
            additionalProperties: false
    partNotFound:
      description: The specified Part does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: number
                const: 404
                example: 404
              message:
                type: string
                example: The specified Part was not found.
            required:
              - status
              - notFound
              - message
            additionalProperties: false
    badRequest:
      description: Bad request.
  schemas:
    ingestPlaylistItem:
      type: object
      properties:
        playlistId:
          type: string
          description: The Id provided by Sofie. This Id will be used for /playlist commands for controlling playlist activations, playback etc.
        rundowns:
          type: array
          description: All rundowns in a Playlist.
          items:
            $ref: '#/components/schemas/ingestRundownItem'
      required:
        - playlistId
        - rundowns
      additionalProperties: false
    ingestRundownItem:
      type: object
      properties:
        externalId:
          type: string
          description: The Id provided by a system external to Sofie that can be used by the same external system to identify this Rundown.
      required:
        - externalId
      additionalProperties: false
    segmentItem:
      type: object
      properties:
        externalId:
          type: string
          description: The Id provided by a system external to Sofie that can be used by the same external system to identify this Segment.
      required:
        - externalId
      additionalProperties: false
    partItem:
      type: object
      properties:
        name:
          type: string
        externalId:
          type: string
          description: The Id provided by a system external to Sofie that can be used by the same external system to identify this Part.
      required:
        - name
        - externalId
      additionalProperties: false
    playlist:
      type: object
      properties:
        name:
          type: string
        externalId:
          type: string
          example: playlist1
        rundownIds:
          type: array
          items:
            type: string
          example:
            - rundown1
            - rundown2
            - rundown3
      required:
        - name
      additionalProperties: false
    playlistResponse:
      type: object
      properties:
        id:
          type: string
        externalId:
          type: string
          example: playlist1
        rundownIds:
          type: array
          items:
            type: string
          example:
            - rundown1
            - rundown2
            - rundown3
        studioId:
          type: string
          example: studio0
      required:
        - id
        - externalId
        - rundownIds
        - studioId
      additionalProperties: false
    rundown:
      type: object
      properties:
        externalId:
          type: string
          example: rundown1
        name:
          type: string
          example: Rundown 1
        type:
          type: string
          example: external
